services:
  postgres:
    image: postgres:16
    expose:
      - "5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - hotel_data:/var/lib/postgresql/data
      - ./db-desing:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - hotel_private
    restart: always
  cache:
    image: redis:8.4-alpine
    healthcheck:
      test: ["CMD", "redis-cli","ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - hotel_private
    restart: always
  admin:
    build: ./src/admin
    expose:
      - "8000"
    networks:
      - hotel_private
    env_file:
      - .env
    restart: always
volumes:
  hotel_data:
networks:
  hotel_private:
    internal: true
